spring.application.name=racer-server
server.port=8080

# Redis connection
spring.data.redis.host=localhost
spring.data.redis.port=6379

# -----------------------------------------------------------------------
# High-Availability: Sentinel
# -----------------------------------------------------------------------
# Uncomment and fill in when running compose.sentinel.yaml:
# spring.data.redis.sentinel.master=mymaster
# spring.data.redis.sentinel.nodes=localhost:26379,localhost:26380,localhost:26381

# HA: Cluster
# -----------------------------------------------------------------------
# Uncomment when running compose.cluster.yaml:
# spring.data.redis.cluster.nodes=localhost:7001,localhost:7002,localhost:7003,localhost:7004,localhost:7005,localhost:7006

# -----------------------------------------------------------------------
# Racer channel configuration
# -----------------------------------------------------------------------
# Default channel (used when @RacerPublisher has no alias or @PublishResult
# has neither channel nor channelRef set)
racer.default-channel=racer:messages

# Named channels — each entry creates a dedicated RacerChannelPublisher
# alias      : short name used in @RacerPublisher("alias") and @PublishResult(channelRef="alias")
# name       : actual Redis channel/key to publish to
# async      : default async flag (true = fire-and-forget, false = blocking)
# sender     : default sender label embedded in the message envelope

racer.channels.orders.name=racer:orders
racer.channels.orders.async=true
racer.channels.orders.sender=order-service

racer.channels.notifications.name=racer:notifications
racer.channels.notifications.async=true
racer.channels.notifications.sender=notification-service

racer.channels.audit.name=racer:audit
racer.channels.audit.async=false
racer.channels.audit.sender=audit-service

# -----------------------------------------------------------------------
# Retention (durable streams + DLQ pruning)
# -----------------------------------------------------------------------
racer.retention.stream-max-len=10000
racer.retention.dlq-max-age-hours=72
racer.retention.schedule-cron=0 0 * * * *

# -----------------------------------------------------------------------
# R-9: Pipelining — parallel batch publish
# -----------------------------------------------------------------------
# Set to true to enable concurrent Flux.merge-based publishing for batch endpoints
racer.pipeline.enabled=false
racer.pipeline.max-batch-size=100

# -----------------------------------------------------------------------
# R-10: Priority channels
# -----------------------------------------------------------------------
# Set to true to activate priority sub-channels and RacerPriorityPublisher
racer.priority.enabled=false
racer.priority.levels=HIGH,NORMAL,LOW
racer.priority.strategy=strict
# Comma-separated channel aliases eligible for priority routing:
# racer.priority.channels=orders,notifications

# -----------------------------------------------------------------------
# R-7: Schema Registry (JSON Schema validation)
# -----------------------------------------------------------------------
# Set to true to activate payload validation on publish and/or consume paths.
# Required: at least one entry under racer.schema.schemas.*
racer.schema.enabled=false
# BOTH | PUBLISH | CONSUME
racer.schema.validation-mode=BOTH
# When true, a schema violation throws SchemaValidationException (routes to DLQ).
# When false, violations are logged as WARN and the message is allowed through.
racer.schema.fail-on-violation=true
# Example: bind the 'orders' alias to a JSON Schema file on the classpath.
# The alias must match a key under racer.channels.* or the channel Redis name.
#racer.schema.schemas.orders.location=classpath:schemas/example-orders.json
#racer.schema.schemas.orders.version=1.0
#racer.schema.schemas.orders.description=Order placement message

# -----------------------------------------------------------------------
# Actuator / Observability
# -----------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# Logging
logging.level.com.cheetah.racer=DEBUG
