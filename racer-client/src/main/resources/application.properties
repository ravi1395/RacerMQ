spring.application.name=racer-client
server.port=8081

# Redis connection
spring.data.redis.host=localhost
spring.data.redis.port=6379

# -----------------------------------------------------------------------
# High-Availability: Sentinel
# -----------------------------------------------------------------------
# Uncomment and fill in when running compose.sentinel.yaml:
# spring.data.redis.sentinel.master=mymaster
# spring.data.redis.sentinel.nodes=localhost:26379,localhost:26380,localhost:26381

# HA: Cluster
# -----------------------------------------------------------------------
# Uncomment when running compose.cluster.yaml:
# spring.data.redis.cluster.nodes=localhost:7001,localhost:7002,localhost:7003,localhost:7004,localhost:7005,localhost:7006

# Initial processing mode: SYNC or ASYNC
racer.client.processing-mode=ASYNC

# -----------------------------------------------------------------------
# Racer channel configuration
# -----------------------------------------------------------------------
racer.default-channel=racer:messages

# The client can also declare publishers for reply / outbound channels
racer.channels.replies.name=racer:client:replies
racer.channels.replies.async=true
racer.channels.replies.sender=racer-client

racer.channels.events.name=racer:client:events
racer.channels.events.async=true
racer.channels.events.sender=racer-client

# -----------------------------------------------------------------------
# Durable stream consumer
# -----------------------------------------------------------------------
# Comma-separated list of stream keys to consume via consumer groups.
# Leave blank to disable the durable consumer.
racer.durable.stream-keys=

# -----------------------------------------------------------------------
# Retention (durable streams + DLQ pruning)
# -----------------------------------------------------------------------
racer.retention.stream-max-len=10000
racer.retention.dlq-max-age-hours=72
racer.retention.schedule-cron=0 0 * * * *

# -----------------------------------------------------------------------
# R-8: Consumer Scaling
# -----------------------------------------------------------------------
# Number of concurrent consumer instances per stream (each gets a unique name)
racer.consumer.concurrency=1
racer.consumer.name-prefix=consumer
# Entries read per poll (COUNT argument to XREADGROUP)
racer.consumer.poll-batch-size=1
racer.consumer.poll-interval-ms=200

# -----------------------------------------------------------------------
# R-8: Key-based stream sharding
# -----------------------------------------------------------------------
racer.sharding.enabled=false
racer.sharding.shard-count=4
# Comma-separated base stream keys to shard:
# racer.sharding.streams=racer:orders:stream,racer:audit:stream

# -----------------------------------------------------------------------
# R-10: Priority channels
# -----------------------------------------------------------------------
racer.priority.enabled=false
racer.priority.levels=HIGH,NORMAL,LOW
racer.priority.strategy=strict
# Comma-separated base Redis channel names to subscribe to for priority routing:
# racer.priority.channels=racer:orders,racer:notifications

# -----------------------------------------------------------------------
# R-7: Schema Registry (JSON Schema validation)
# -----------------------------------------------------------------------
racer.schema.enabled=false
# racer.schema.validation-mode=BOTH
# racer.schema.fail-on-violation=true
#racer.schema.schemas.replies.location=classpath:schemas/reply-schema.json

# -----------------------------------------------------------------------
# Actuator / Observability
# -----------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# Logging
logging.level.com.cheetah.racer=DEBUG
